name: national_quiz_app
description: A native Android application converted from the React web archive app.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Suite for Live Synchronization & Database
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.5
  firebase_auth: ^4.17.8

  # Architecture & State Management (BLoC Pattern)
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Storage & Offline Cache
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Device Hardware Integration (Capacitor Replacements)
  device_info_plus: ^9.1.1
  share_plus: ^7.2.1

  # UI, Icons, Fonts & Markdown Rendering
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.19
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.0 # For smooth motion/react transition equivalents
  flutter_spinkit: ^5.2.0 # Loading indicators

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # Asset setup if offline local quiz data or custom SVG icons are used
  assets:
    - assets/data/
    - assets/images/
