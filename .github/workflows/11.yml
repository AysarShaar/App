name: Build Secured - Dowrat Watani Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. تثبيت جافا بالإصدار الحديث JDK 21 (توزيعة Temurin الاحترافية)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. تثبيت الفلاتر في السحاب
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. جلب حزم ومكتبات الفلاتر مباشرة من الـ Root
      - name: Install Flutter Dependencies
        run: |
          flutter pub get

      # 4. توليد مجلد أندرويد بالمعرّف الصحيح com.dawrat.watani
      - name: Auto-Generate Android Project Structure
        run: |
          echo "Generating clean Android project structure..."
          flutter create . --project-name=national_quiz_app --org=com.dawrat --platforms=android
          flutter pub get

      # 5. خطوة حاقن الفايربيس الآمنة والمباشرة بدون تعديل نصوص ملفات الجرادل
      - name: Inject Firebase Google Services Config
        run: |
          if [ -f "google-services.json" ]; then
            echo "google-services.json found! Injecting into android/app/..."
            cp google-services.json android/app/
          else
            echo "Warning: google-services.json not found in root. If you use Firebase, build might fail."
          fi

      # 6. خطوة خاصة بـ Hive: تشغيل التوليد التلقائي إذا دعت الحاجة
      - name: Run Build Runner (Hive Generation)
        run: |
          if grep -q "@HiveType" -r lib/ 2>/dev/null; then
            flutter pub run build_runner build --delete-conflicting-outputs
          else
            echo "No Hive models found yet. Skipping build_runner safely."
          fi

      # 7. ميزة الحماية المتقدمة: حجب تصوير الشاشة وتسجيل الفيديو (FLAG_SECURE)
      - name: Screen Security (Anti-Screenshot & Video)
        run: |
          FILE_PATH=$(find android/app/src/main -name "MainActivity.kt" -o -name "MainActivity.java" | head -n 1)
          if [ -z "$FILE_PATH" ]; then
            echo "Error: MainActivity file not found!"
            exit 1
          fi

          if [[ "$FILE_PATH" == *".kt" ]]; then
            sed -i '/import io.flutter.embedding.android.FlutterActivity/a import android.view.WindowManager\nimport android.os.Bundle' $FILE_PATH
            sed -i '/class MainActivity/a \    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState) \n        window.setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowingManager.LayoutParams.FLAG_SECURE)\n    }' $FILE_PATH
          else
            sed -i '/import io.flutter.embedding.android.FlutterActivity/a import android.view.WindowManager;\nimport android.os.Bundle;' $FILE_PATH
            sed -i '/public class MainActivity/a \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);\n    }' $FILE_PATH
          fi
          echo "Screen Security Injected Successfully!"

      # 8. ميزة الحماية من الهندسة العكسية وبناء الـ APK
      - name: Build Protected Flutter APK
        run: |
          flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      # 9. توقيع التطبيق يدوياً بملف الـ Keystore الخاص بك
      - name: Sign Flutter APK manually
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > my-release-key.keystore
          BUILD_TOOLS_DIR=$(ls -1d /usr/local/lib/android/sdk/build-tools/* | grep -E '[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          ALIGNED_APK_PATH="build/app/outputs/flutter-apk/app-release-aligned.apk"
          SIGNED_APK_PATH="build/app/outputs/flutter-apk/MediGo-Flutter-V${{ github.run_number }}-Secured.apk"
          
          $BUILD_TOOLS_DIR/zipalign -v -p 4 $APK_PATH $ALIGNED_APK_PATH
          $BUILD_TOOLS_DIR/apksigner sign --ks my-release-key.keystore --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" --ks-key-alias "$KEY_ALIAS" --out $SIGNED_APK_PATH $ALIGNED_APK_PATH
          
          echo "SIGNED_APK_PATH=$SIGNED_APK_PATH" >> $GITHUB_ENV

      # 10. رفع ملف الـ APK المحمي والموقّع الجاهز للتنزيل
      - name: Upload Secured & Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Dowrat-Watani-Flutter-V${{ github.run_number }}
          path: ${{ env.SIGNED_APK_PATH }}

